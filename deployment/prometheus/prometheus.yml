global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "cinema-forecast-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/v1/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    metrics_path: "/metrics"
    scrape_interval: 15s

rule_files:
  - "alerts.yml"
